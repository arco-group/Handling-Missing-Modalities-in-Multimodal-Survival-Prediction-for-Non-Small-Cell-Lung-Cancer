# @package _global_

experiment_name: ${db_name}_${seed}_multimodal_joint_fusion_classification_with_missing_generation_frozen # _pretrained # DO NOT CHANGE
experiment_subname: ${model_name}_${preprocessing.imputer.method}_${preprocessing.numerical.method}_${preprocessing.categorical.method}_${missing_generation.train.apply_to}_${missing_generation.train.method} # DO NOT CHANGE
pipeline: multimodal_joint_fusion

seed: 42
verbose: 1
continue_experiment: True  # True # False

missing_percentages: [0.0] # , 0.05, 0.25, 0.5]
test_missing_percentages: [ [0.0, 0.0], [0.0, 0.25], [0.0, 0.5], [0.0, 0.75], [0.0, 1.0], [1.0, 0.0], [0.75, 0.0], [0.5, 0.0], [0.25, 0.00] ]
multimodal_missing_generation: separate_modalities

naim_version: cat
maria_version: cat
num_layers: 2

db_name: multimodal_MIMIC
model_name: ${shared_net.name}

model_parts:
  ms_models[0]: [1e-6, 1e-7, 1e-8, 1e-9, 1e-10] # ${dl_params.learning_rates}
  ms_models[1]: [1e-6, 1e-7, 1e-8, 1e-9, 1e-10] # [1e-05, 9.62320368593087e-06, 8.550178566873412e-06, 6.9442829902071945e-06, 5.05e-06, 3.1557170097928058e-06, 1.54982143312659e-06, 4.7679631406913065e-07, 1e-07]
  shared_net: ${dl_params.learning_rates}

augmentation_probability: 0.5
missing_augmentation_probability: 0.3

initialize_weights: True
image_caching: True

defaults:
  - _self_
  - paths@: default
  - paths: missing_experiment_paths

  - databases@dbs.0: MIMIC_clinical
  - databases@dbs.1: MIMIC_CXR

  - cross_validation@test_cv: multilabelstratifiedkfold
  - cross_validation@val_cv: multilabelholdout

  - preprocessing/missing_generation@missing_generation.train: MCAR_global # DO NOT CHANGE
  - preprocessing/missing_generation@missing_generation.val: no_generation # DO NOT CHANGE
  - preprocessing/missing_generation@missing_generation.test: MCAR_global  # DO NOT CHANGE

  - preprocessing/numerical: normalize # normalize # standardize
  - preprocessing/categorical: categoricalencode # categoricalencode or onehotencode
  - preprocessing/imputer: noimputation # simple or knn or iterative or noimputation

  - preprocessing/images@preprocessing.images.0: channels_first
  #- preprocessing/images@preprocessing.images.1: center_crop
  - preprocessing/images@preprocessing.images.1: normalize
  #- preprocessing/images@preprocessing.images.2: padding
  - preprocessing/images@preprocessing.images.2: resize
  - preprocessing/images@preprocessing.images.3: gray2rgb
  # - preprocessing/images@preprocessing.images.4: standardize_imagenet

  #- augmentation/images@preprocessing.images_augmentation.0: zoom
  #- augmentation/images@preprocessing.images_augmentation.1: crop
  #- preprocessing/images@preprocessing.images_augmentation.2: padding
  #- preprocessing/images@preprocessing.images_augmentation.3: resize
  - augmentation/images@preprocessing.images_augmentation.0: random_order_apply
  - augmentation/images@preprocessing.images_augmentation.1: horizontal_flip
  - augmentation/images@preprocessing.images_augmentation.2: rotation
  #- augmentation/images@preprocessing.images_augmentation.7: cut_out
  #- augmentation/images@preprocessing.images_augmentation.8: vertical_flip

  - model_type_params@dl_params: dl_params
  - model_type_params@ml_params: ml_params

  - model@ms_models.0: naim_pretrained
  - model@ms_models.1: resnet_pretrained
  - model@shared_net: maria
  - model: multimodal_learner

  - model_type_params@train.dl_params: dl_params
  - initializer@train.initializer: xavier_uniform
  - loss@train.loss.mBCE: multilabel_binary_cross_entropy
  #- regularizer@train.regularizer.l1: l1
  #- regularizer@train.regularizer.l2: l2
  - optimizer@train.optimizer: adamW
  - train_utils@train.manager: train_manager

  #- metric@train.set_metrics.auc: auc
  #- metric@train.set_metrics.accuracy: accuracy
  #- metric@train.set_metrics.mcc: mcc
  #- metric@train.set_metrics.f1: f1_score

  - metric@performance_metrics.auc: auc
  - metric@performance_metrics.acc: accuracy
  - metric@performance_metrics.rec: recall
  - metric@performance_metrics.prec: precision
  - metric@performance_metrics.f1: f1_score
  - metric@performance_metrics.mcc: mcc
  - metric@performance_metrics.gmean: gmean

  #- overrides@shared_net: naimmean
  #- overrides@preprocessing.images.3: resize256
