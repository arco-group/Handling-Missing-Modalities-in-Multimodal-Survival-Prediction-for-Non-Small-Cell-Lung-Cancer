_target_: CMC_utils.datasets.ClassificationDataset # DO NOT CHANGE
_convert_: all # DO NOT CHANGE

name: AI4Covid_tabular_prognosis # Name of the dataset
db_type: tabular # DO NOT CHANGE
classes: [ 0, 1 ] # List of the classes
label_type: multiclass # multiclass or binary

task: classification # DO NOT CHANGE

path: ${data_path}/tabular/classification/AI4Covid/processed/complete_data.csv # Relative path to the file

columns: # Dictionary containing features names as keys and their types as values # DO NOT REMOVE
    ID: id
    Age: float
    Sex: category
    WBC: float
    RBC: float
    CRP: float
    Fibrinogen: float
    Glucose: float
    PCT: float
    LDH: float
    INR: float
    D_dimer: float
    Ox_percentage: float
    PaO2: float
    SaO2: float
    PaCO2: float
    pH: float
    CardiovascularDisease: category
    IschemicHeartDisease: category
    AtrialFibrillation: category
    HeartFailure: category
    Ictus: category
    HighBloodPressure: category
    Diabetes: category
    Dementia: category
    BPCO: category
    Cancer: category
    ChronicKidneyDisease: category
    RespiratoryFailure: category
    Obesity: category
    PositivityAtAdmission: category
    Temp_C: float
    DaysFever: float
    Cough: category
    DifficultyInBreathing: category
    # Other features to be inserted
    # Prognosis: target  # DO NOT CHANGE THE VALUE, NAME CORRECTLY THE TARGET VARIABLE
    Death: target

pandas_load_kwargs:
  header: 0

dataset_class: # DO NOT CHANGE
  _target_: CMC_utils.datasets.SupervisedTabularDatasetTorch # DO NOT CHANGE
  _convert_: all # DO NOT CHANGE