_target_: CMC_utils.datasets.ClassificationDataset # DO NOT CHANGE
_convert_: all # DO NOT CHANGE

name: AID # Name of the dataset
db_type: imaging # DO NOT CHANGE
classes: ["Airport", "BareLand", "BaseballField", "Beach", "Bridge", "Center", "Church", "Commercial", "DenseResidential", "Desert", "Farmland", "Forest", "Industrial", "Meadow", "MediumResidential", "Mountain", "Park", "Parking", "Playground", "Pond", "Port", "RailwayStation", "Resort", "River", "School", "SparseResidential", "Square", "Stadium", "StorageTanks", "Viaduct"] # List of the classes
label_type: multiclass # multiclass or binary

task: classification # DO NOT CHANGE

path: ${data_path}/imaging/classification/AID/AID.csv # Relative path to the file
data_folder: ${data_path}/imaging/classification/AID/ # Relative path to the folder containing the images.
# The images' path will be created as data_folder + folder + image

columns:  # Dictionary containing features names as keys and their types as values # DO NOT REMOVE
  ID:            id
  path:          folder
  filename:      image
  # Other features to be inserted
  class:         target  # DO NOT CHANGE THE VALUE, NAME CORRECTLY THE TARGET VARIABLE

pandas_load_kwargs:
  header: 0

dataset_class:  # DO NOT CHANGE
  _target_: CMC_utils.datasets.SupervisedImagingDatasetTorch # DO NOT CHANGE
  _convert_: all # DO NOT CHANGE
