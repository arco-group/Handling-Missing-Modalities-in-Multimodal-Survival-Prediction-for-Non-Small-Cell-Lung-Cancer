_target_: CMC_utils.datasets.SurvivalDataset # DO NOT CHANGE
_convert_: all # DO NOT CHANGE

name: AIDA_LP_6m # Name of the dataset
db_type: tabular # DO NOT CHANGE
classes: ["NO", "SI" ] # List of the classes
label_type: single_risk_survival # multiclass or binary

task: survival_analysis # DO NOT CHANGE
ngroups_for_cv: 1
num_events: 1
max_time: 5 # 60
time_divisor: ${oc.select:time_divisor, 1}
fold: days2recidiva_task
path: data/tabular/survival/AIDA/tabular/clinical_data_III_stage.csv # Relative path to the file

columns: # Dictionary containing features names as keys and their types as values # DO NOT REMOVE
    Sesso: category
    Stadio alla diagnosi: category
    Smoking habitus: category
    Familiarità: category
    Comorbidità1: category
    Comorbidità2: category
    Comorbidità3: category
    Diagnosi: category
    EGFR: category
    ALK: category
    MET: category
    Tecnica: category
    Tipo CT induzione: category
    Schema CT concomitante: category
    Immuno post radiochemio (adj): category
    eta: float
    Peso (kg): float
    Altezza (cm): float
    cT: float
    cN: float
    NRS: float
    Sig/die: float
    PS ECOG basale: float
    PDL1(%): float
    Durata RT: float
    CTV iniziale: float
    Dose erogata [Gy]: float
    Numero frazioni: float
    Giorni di Sospensione: float
    Tox esofagea: float
    Tox polmonare: float
    Tox Hb: float
    Tox Neu: float
    Tox PLT: float
    # Other features to be inserted
    recidiva: target # DO NOT CHANGE THE VALUE, NAME CORRECTLY THE TARGET VARIABLE
    6months2recidiva: target_event_time
    #6months2OS: target_event_time

pandas_load_kwargs:
  header: 0
  index_col: 0

use_bins: True # DO NOT CHANGE

dataset_class: # DO NOT CHANGE
  _target_: CMC_utils.datasets.SupervisedTabularDatasetTorch # DO NOT CHANGE
  _convert_: all # DO NOT CHANGE