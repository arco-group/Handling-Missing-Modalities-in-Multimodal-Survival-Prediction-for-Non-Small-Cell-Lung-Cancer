_target_: CMC_utils.datasets.RegressionDataset # DO NOT CHANGE
_convert_: all # DO NOT CHANGE

name: white_wine_quality # Name of the dataset
db_type: tabular # DO NOT CHANGE
label_type: continuous # multiclass or binary

task: regression # DO NOT CHANGE

path: ${data_path}/tabular/regression/winequality/winequality-white.csv # Relative path to the file

columns: # Dictionary containing features names as keys and their types as values # DO NOT REMOVE
  fixed acidity:        float
  volatile acidity:     float
  citric acid:          float
  residual sugar:       float
  chlorides:            float
  free sulfur dioxide:  float
  total sulfur dioxide: float
  density:              float
  pH:                   float
  sulphates:            float
  alcohol:              float
  # Other features to be inserted
  quality:         target  # DO NOT CHANGE THE VALUE, NAME CORRECTLY THE TARGET VARIABLE

normalize_target: False

decimals: 2

pandas_load_kwargs:
  header: 0
  sep: ';'

dataset_class: # DO NOT CHANGE
  _target_: CMC_utils.datasets.SupervisedTabularDatasetTorch # DO NOT CHANGE
  _convert_: all # DO NOT CHANGE