# @package _global_

experiment_name: ${model_name}_${db_name}_${seed}_multimodal_late_fusion_classification_with_missing_generation_over_test # _pretrained # DO NOT CHANGE
experiment_subname: ${model_name}_${preprocessing.imputer.method}_${preprocessing.numerical.method}_${preprocessing.categorical.method}_${missing_generation.train.apply_to}_${missing_generation.train.method} # DO NOT CHANGE
pipeline: multimodal_late_fusion




missing_percentages: [0.0] # , 0.05, 0.25, 0.5]
test_missing_percentages:  [[0.0, 0.0], [0.25, 0.0] , [0.5, 0.0], [0.75, 0.0], [1.0, 0.0], [0.0, 0.25], [0.0, 0.5], [0.0, 0.75], [0.0, 1.0]]
multimodal_missing_generation: separate_modalities_previously_missing
proj_dims: [256, 0] # CT, tabular
seed: 42
verbose: 1
time_divisor: 1

continue_experiment: true # True # False
naim_version: cat
maria_version: cat+linear
db_fold: ${dbs.0.fold}
db_name: CT+tabular_multimodal
model_name: late_fusion
mode: late_ct_tab_cox-label_cix


#augmentation_probability: 0.0
missing_augmentation_probability: 0.15
initialize_weights: True
load_model_pretrained_parts:
  use: False
  freeze_model_params: false
  #model[2]: outputs/fold_specific/wsi_cox-label_cix/${model.0.name}_${preprocessing.imputer.method}_${preprocessing.numerical.method}_${preprocessing.categorical.method}_CTIx_${dbs.0.name}_${seed}_time2event
  model[0]: outputs/fold_specific/ct_cox-label_cix/${model.0.name}_${preprocessing.imputer.method}_${preprocessing.numerical.method}_${preprocessing.categorical.method}_CTIx_${dbs.0.name}_${seed}_time2event
  model[1]: outputs/fold_specific/tabular_cox-label_cix/${model.1.name}_${preprocessing.imputer.method}_${preprocessing.numerical.method}_${preprocessing.categorical.method}_CTIx_${dbs.1.name}_${seed}_time2event
defaults:
  - _self_
  - paths@: default
  - paths: missing_experiment_paths
  #- databases@dbs.2: WSI_AIDA_OS_1d_regression
  - databases@dbs.0: CT_AIDA_OS_1d_regression
  - databases@dbs.1: AIDA_OS_1d_regression
  - cross_validation@test_cv: provided_mm
  - cross_validation@val_cv: provided_mm
  - preprocessing/missing_generation@missing_generation.train: MCAR_global # DO NOT CHANGE
  - preprocessing/missing_generation@missing_generation.val: no_generation # DO NOT CHANGE
  - preprocessing/missing_generation@missing_generation.test: MCAR_global  # DO NOT CHANGE

  - preprocessing/numerical: normalize # normalize # standardize
  - preprocessing/categorical: categoricalencode # categoricalencode or onehotencode
  - preprocessing/imputer: noimputation # simple or knn or iterative or noimputation
  - preprocessing/label: cox
  - model_type_params@dl_params: dl_params_pat
  - model_type_params@ml_params: ml_params

  #- model@model.2: survival_NN_ODST_NAIM
  - model@model.0: survival_NN_ODST_NAIM
  - model@model.1: survival_NN_ODST_NAIM

  - model_type_params@train.dl_params: dl_params
  - initializer@train.initializer: xavier_uniform #uniform
  - loss@train.loss.survival_regression: survival_regression_cox
  #- loss@train.loss.loglike: survival_loglikelihood
  #- loss@train.loss.ranking: survival_ranking
  #- regularizer@train.regularizer.l1: l1
  # -regularizer@train.regularizer.l2: l2
  - optimizer@train.optimizer: adamW
  - metric@train.set_metrics.ct_index: c_index
  - train_utils@train.manager: train_manager
  - metric@performance_metrics.ct_index: c_index
  - metric@performance_metrics.td_auc: td_auc
  - metric@performance_metrics.uno_c_index: uno_c_index


late_fusion_approaches:
  - rank_sum

