name: coxnet
framework: sksurv
model_type: tabular

model_tasks:
  - survival_analysis

label_types:
  - single_risk_survival

set_params_function:
  _target_: CMC_utils.models.set_survival_params

init_params:
  _target_: sksurv.linear_model.CoxnetSurvivalAnalysis
  _convert_: all

  n_alphas: ${ml_params.n_estimators}
  # (int, optional, default: 100) – Number of alphas along the regularization path.

  # alphas:
  # (array-like or None, optional) – List of alphas where to compute the models. If None alphas are set automatically.

  alpha_min_ratio: auto
  # (float or { "auto" }, optional, default: "auto") –
  # Determines minimum alpha of the regularization path if alphas is None. The smallest value for alpha is computed as the fraction of the data derived maximum alpha (i.e. the smallest value for which all coefficients are zero).
  # If set to “auto”, the value will depend on the sample size relative to the number of features. If n_samples > n_features, the default value is 0.0001 If n_samples <= n_features, 0.01 is the default value.

  l1_ratio: 0.5
  # (float, optional, default: 0.5) – The ElasticNet mixing parameter, with 0 < l1_ratio <= 1. For l1_ratio = 0 the penalty is an L2 penalty. For l1_ratio = 1 it is an L1 penalty. For 0 < l1_ratio < 1, the penalty is a combination of L1 and L2.

  penalty_factor:
  # (array-like or None, optional) – Separate penalty factors can be applied to each coefficient. This is a number that multiplies alpha to allow differential shrinkage. Can be 0 for some variables, which implies no shrinkage, and that variable is always included in the model. Default is 1 for all variables. Note: the penalty factors are internally rescaled to sum to n_features, and the alphas sequence will reflect this change.

  normalize: False
  # (boolean, optional, default: False) – If True, the features X will be normalized before optimization by subtracting the mean and dividing by the l2-norm. If you wish to standardize, please use sklearn.preprocessing.StandardScaler before calling fit on an estimator with normalize=False.

  copy_X: True
  # (boolean, optional, default: True) – If True, X will be copied; else, it may be overwritten.

  tol: 1e-7
  # (float, optional, default: 1e-7) – The tolerance for the optimization: optimization continues until all updates are smaller than tol.

  max_iter: 100000
  # (int, optional, default: 100000) – The maximum number of iterations.

  verbose: ${verbose}
  # (bool, optional, default: False) – Whether to print additional information during optimization.

  fit_baseline_model: True
  # (bool, optional, default: False) – Whether to estimate baseline survival function and baseline cumulative hazard function for each alpha. If enabled, predict_cumulative_hazard_function() and predict_survival_function() can be used to obtain predicted cumulative hazard function and survival function.


fit_params: {}

train_function:
  _target_: CMC_utils.models.train_sklearn_model

test_function:
  _target_: CMC_utils.models.test_sklearn_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pkl

load_function:
  _target_: CMC_utils.save_load.load_model