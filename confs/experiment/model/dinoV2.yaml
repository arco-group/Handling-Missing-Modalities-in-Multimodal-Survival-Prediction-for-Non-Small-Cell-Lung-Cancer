name: ViT
framework: torch
model_type: imaging

model_tasks:
  - classification
  - regression

label_types:
  - binary
  - categorical
  - continuous

set_params_function:
  _target_: CMC_utils.models.set_sota_model_params

init_params:
  _target_: CMC_utils.models.get_dino_vit
  _convert_: all

  name: dinov2_vitb14

  num_classes:

  freeze_model_params: True

  checkpoint_path: ./checkpoints/mim-finetuned/trained_model.pth

  extractor: False

fit_params: {}

model_parts:
  patch_embed: [ 1e-06, 9.62320368593087e-07, 8.55017856687341e-07, 6.944282990207195e-07, 5.05e-07, 3.155717009792806e-07, 1.5498214331265902e-07, 4.7679631406913065e-08, 1e-08 ] # [1e-5, 1e-6, 1e-7] #, 1e-8, 1e-9]
  blocks: [ 1e-06, 9.62320368593087e-07, 8.55017856687341e-07, 6.944282990207195e-07, 5.05e-07, 3.155717009792806e-07, 1.5498214331265902e-07, 4.7679631406913065e-08, 1e-08 ] # [1e-5, 1e-6, 1e-7] #, 1e-8, 1e-9]
  head: ${dl_params.learning_rates}

train_function:
  _target_: CMC_utils.models.train_torch_model

test_function:
  _target_: CMC_utils.models.test_torch_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pth

load_function:
  _target_: CMC_utils.save_load.load_model
