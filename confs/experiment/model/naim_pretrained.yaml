name: naim${.init_params.embed_vector_fun}
framework: torch
model_type: tabular
is_SOTA: False

model_tasks:
  - classification
  - regression

label_types:
  - binary
  - categorical
  - continuous

set_params_function:
  _target_: CMC_utils.models.set_naim_params

init_params:
  _target_: CMC_utils.models.get_naim_pretrained
  _convert_: all

  checkpoint_path:

  load_weights: True

  freeze_model_params: True #True

  input_size:

  output_size:

  cat_idxs:

  cat_dims:

  d_token: 1024

  embedder_initialization: normal

  bias: False

  missing_value: ~inf

  num_heads: 16

  feedforward_dim: 1000

  dropout_rate: 0.0

  activation: relu

  num_layers: ${oc.select:num_layers, 6}

  embed_vector_fun: ${oc.select:naim_version, cat}

  limit_regression_output: False

  extractor: False

fit_params: {}

train_function:
  _target_: CMC_utils.models.train_torch_model

test_function:
  _target_: CMC_utils.models.test_torch_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pth

load_function:
  _target_: CMC_utils.save_load.load_model