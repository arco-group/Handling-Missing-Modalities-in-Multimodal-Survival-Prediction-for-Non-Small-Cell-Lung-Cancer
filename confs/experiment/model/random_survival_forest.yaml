name: RSF
framework: sksurv
model_type: tabular

model_tasks:
  - survival_analysis

label_types:
  - single_risk_survival
  - single_risk_survival_regression


set_params_function:
  _target_: CMC_utils.models.set_survival_params

init_params:
  _target_: sksurv.ensemble.RandomSurvivalForest
  _convert_: all

  n_estimators: ${ml_params.n_estimators}
  # (integer, optional, default: 100) – The number of trees in the forest.

  max_depth:
  # (int or None, optional, default: None) – The maximum depth of the tree. If None, then nodes are expanded until all leaves are pure or until all leaves contain less than min_samples_split samples.

  min_samples_split: 6
  # (int, float, optional, default: 6) – The minimum number of samples required to split an internal node:
  # If int, then consider min_samples_split as the minimum number.
  # If float, then min_samples_split is a fraction and ceil(min_samples_split * n_samples) are the minimum number of samples for each split.

  min_samples_leaf: 3
  # (int, float, optional, default: 3) – The minimum number of samples required to be at a leaf node. A split point at any depth will only be considered if it leaves at least min_samples_leaf training samples in each of the left and right branches. This may have the effect of smoothing the model, especially in regression.
  # If int, then consider min_samples_leaf as the minimum number.
  # If float, then min_samples_leaf is a fraction and ceil(min_samples_leaf * n_samples) are the minimum number of samples for each node.

  min_weight_fraction_leaf: 0.
  # (float, optional, default: 0.) – The minimum weighted fraction of the sum total of weights (of all the input samples) required to be at a leaf node. Samples have equal weight when sample_weight is not provided.

  max_features:
  #(int, float, string or None, optional, default: None) – The number of features to consider when looking for the best split:
  # If int, then consider max_features features at each split.
  # If float, then max_features is a fraction and int(max_features * n_features) features are considered at each split.
  # If “sqrt”, then max_features=sqrt(n_features).
  # If “log2”, then max_features=log2(n_features).
  # If None, then max_features=n_features.
  # Note: the search for a split does not stop until at least one valid partition of the node samples is found, even if it requires to effectively inspect more than max_features features.

  max_leaf_nodes:
  # (int or None, optional, default: None) – Grow a tree with max_leaf_nodes in best-first fashion. Best nodes are defined as relative reduction in impurity. If None then unlimited number of leaf nodes.

  bootstrap: True
  # (boolean, optional, default: True) – Whether bootstrap samples are used when building trees. If False, the whole datset is used to build each tree.

  oob_score: False
  # (bool, default: False) – Whether to use out-of-bag samples to estimate the generalization accuracy.

  n_jobs:
  # (int or None, optional (default=None)) – The number of jobs to run in parallel for both fit and predict. None means 1 unless in a joblib.parallel_backend context. -1 means using all processors.

  random_state: ${seed}
  # (int, RandomState instance or None, optional, default: None) – If int, random_state is the seed used by the random number generator; If RandomState instance, random_state is the random number generator; If None, the random number generator is the RandomState instance used by np.random.

  verbose: ${verbose}
  # (int, optional, default: 0) – Controls the verbosity when fitting and predicting.

  # warm_start:
  # (bool, optional, default: False) – When set to True, reuse the solution of the previous call to fit and add more estimators to the ensemble, otherwise, just fit a whole new forest.

  max_samples:
  # (int or float, optional, default: None) – If bootstrap is True, the number of samples to draw from X to train each base estimator. - If None (default), then draw X.shape[0] samples. - If int, then draw max_samples samples. - If float, then draw max_samples * X.shape[0] samples. Thus, max_samples should be in the interval (0.0, 1.0].


fit_params: {}

train_function:
  _target_: CMC_utils.models.train_sklearn_model

test_function:
  _target_: CMC_utils.models.test_sklearn_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pkl

load_function:
  _target_: CMC_utils.save_load.load_model