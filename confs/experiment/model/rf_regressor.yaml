name: rf
framework: sklearn
model_type: tabular

model_tasks:
  - regression

label_types:
  - continuous

set_params_function:
  _target_: CMC_utils.miscellaneous.do_nothing

init_params:
  _target_: sklearn.ensemble.RandomForestRegressor
  _convert_: all

  n_estimators: ${ml_params.n_estimators}
  # The number of trees in the forest.
  # int, default=100

  criterion: squared_error
  # {“squared_error”, “absolute_error”, “friedman_mse”, “poisson”}, default=”squared_error”
  # The function to measure the quality of a split. Supported criteria are “squared_error” for the mean squared error,
  # which is equal to variance reduction as feature selection criterion and minimizes the L2 loss using the mean of
  # each terminal node, “friedman_mse”, which uses mean squared error with Friedman’s improvement score for potential
  # splits, “absolute_error” for the mean absolute error, which minimizes the L1 loss using the median of each terminal
  # node, and “poisson” which uses reduction in Poisson deviance to find splits. Training using “absolute_error” is
  # significantly slower than when using “squared_error”.

  max_depth:
  # The maximum depth of the tree. If None, then nodes are expanded until all leaves are pure or until all leaves contain less than min_samples_split samples.
  # int, default=None

  min_samples_split: 2
  # The minimum number of samples required to split an internal node:
  # int or float, default=2
  # - If int, then consider min_samples_split as the minimum number.
  # - If float, then min_samples_split is a fraction and ceil(min_samples_split * n_samples) are the minimum number of samples for each split.

  min_samples_leaf: 1
  # The minimum number of samples required to be at a leaf node. A split point at any depth will only be considered if it leaves at least min_samples_leaf training samples in each of the left and right branches. This may have the effect of smoothing the model, especially in regression.
  # int or float, default=1
  # - If int, then consider min_samples_leaf as the minimum number.
  # - If float, then min_samples_leaf is a fraction and ceil(min_samples_leaf * n_samples) are the minimum number of samples for each node.

  min_weight_fraction_leaf: 0.0
  # The minimum weighted fraction of the sum total of weights (of all the input samples) required to be at a leaf node. Samples have equal weight when sample_weight is not provided.
  # float, default=0.0

  max_features: 1.0
  # {“sqrt”, “log2”, None}, int or float, default=1.0
  # The number of features to consider when looking for the best split:
  # If int, then consider max_features features at each split.
  # If float, then max_features is a fraction and max(1, int(max_features * n_features_in_)) features are considered at each split.
  # If “sqrt”, then max_features=sqrt(n_features).
  # If “log2”, then max_features=log2(n_features).
  # If None or 1.0, then max_features=n_features.

  max_leaf_nodes:
  # Grow trees with max_leaf_nodes in best-first fashion. Best nodes are defined as relative reduction in impurity. If None then unlimited number of leaf nodes.
  # int, default=None

  min_impurity_decrease: 0.0
  # A node will be split if this split induces a decrease of the impurity greater than or equal to this value.
  # float, default=0.0
  # The weighted impurity decrease equation is the following:
  # N_t / N * (impurity - N_t_R / N_t * right_impurity - N_t_L / N_t * left_impurity)
  # where N is the total number of samples, N_t is the number of samples at the current node, N_t_L is the number of samples in the left child, and N_t_R is the number of samples in the right child.
  # N, N_t, N_t_R and N_t_L all refer to the weighted sum, if sample_weight is passed.

  bootstrap: True
  # Whether bootstrap samples are used when building trees. If False, the whole dataset is used to build each tree.
  # bool, default=True

  oob_score: False
  # Whether to use out-of-bag samples to estimate the generalization score. Only available if bootstrap=True.
  # bool, default=False

  n_jobs:
  # The number of jobs to run in parallel. fit, predict, decision_path and apply are all parallelized over the trees. None means 1 unless in a joblib.parallel_backend context. -1 means using all processors. See Glossary for more details.
  # int, default=None

  random_state: ${seed}
  # Controls both the randomness of the bootstrapping of the samples used when building trees (if bootstrap=True) and the sampling of the features to consider when looking for the best split at each node (if max_features < n_features). See Glossary for details.
  # int, RandomState instance or None, default=None

  verbose: ${verbose}
  # Controls the verbosity when fitting and predicting.
  # int, default=0

  warm_start: False
  # When set to True, reuse the solution of the previous call to fit and add more estimators to the ensemble, otherwise, just fit a whole new forest. See Glossary and Fitting additional weak-learners for details.
  # bool, default=False

  ccp_alpha: 0.0
  # Complexity parameter used for Minimal Cost-Complexity Pruning. The subtree with the largest cost complexity that is smaller than ccp_alpha will be chosen. By default, no pruning is performed. See Minimal Cost-Complexity Pruning for details.
  # non-negative float, default=0.0

  max_samples:
  # If bootstrap is True, the number of samples to draw from X to train each base estimator.
  # int or float, default=None
  # - If None (default), then draw X.shape[0] samples.
  # - If int, then draw max_samples samples.
  # - If float, then draw max_samples * X.shape[0] samples. Thus, max_samples should be in the interval (0.0, 1.0].

  monotonic_cst:
  # array-like of int of shape (n_features), default=None
  # Indicates the monotonicity constraint to enforce on each feature.
  # 1: monotonically increasing
  # 0: no constraint
  # -1: monotonically decreasing
  # If monotonic_cst is None, no constraints are applied.
  # Monotonicity constraints are not supported for:
  # multioutput regressions (i.e. when n_outputs_ > 1),
  # regressions trained on data with missing values.

fit_params: {}

train_function:
  _target_: CMC_utils.models.train_sklearn_model

test_function:
  _target_: CMC_utils.models.test_sklearn_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pkl

load_function:
  _target_: CMC_utils.save_load.load_model