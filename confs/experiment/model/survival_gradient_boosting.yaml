name: survivalGradientBoosting
framework: sksurv
model_type: tabular

model_tasks:
  - survival_analysis

label_types:
  - single_risk_survival

set_params_function:
  _target_: CMC_utils.models.set_survival_params

init_params:
  _target_: sksurv.ensemble.GradientBoostingSurvivalAnalysis
  _convert_: all

  loss: coxph
  # ({'coxph', 'squared', 'ipcwls'}, optional, default: 'coxph') – loss function to be optimized. ‘coxph’ refers to partial likelihood loss of Cox’s proportional hazards model. The loss ‘squared’ minimizes a squared regression loss that ignores predictions beyond the time of censoring, and ‘ipcwls’ refers to inverse-probability of censoring weighted least squares error.

  learning_rate: 0.1 # ${dl_params.init_learning_rate}
  # (float, optional, default: 0.1) – learning rate shrinks the contribution of each tree by learning_rate. There is a trade-off between learning_rate and n_estimators.

  n_estimators: ${ml_params.n_estimators}
  # (int, default: 100) – The number of regression trees to create. Gradient boosting is fairly robust to over-fitting so a large number usually results in better performance.

  criterion: friedman_mse
  # (string, optional, default: 'friedman_mse') – The function to measure the quality of a split. Supported criteria are “friedman_mse” for the mean squared error with improvement score by Friedman, “mse” for mean squared error, and “mae” for the mean absolute error. The default value of “friedman_mse” is generally the best as it can provide a better approximation in some cases.

  min_samples_split: 2
  # (integer, optional, default: 2) – The minimum number of samples required to split an internal node.

  min_samples_leaf: 1
  # (integer, optional, default: 1) – The minimum number of samples required to be at a leaf node.

  min_weight_fraction_leaf: 0.
  # (float, optional, default: 0.) – The minimum weighted fraction of the input samples required to be at a leaf node.

  max_depth: 3
  # (integer, optional, default: 3) – maximum depth of the individual regression estimators. The maximum depth limits the number of nodes in the tree. Tune this parameter for best performance; the best value depends on the interaction of the input variables. Ignored if max_leaf_nodes is not None.

  min_impurity_decrease: 0.
  # (float, optional, default: 0.) – A node will be split if this split induces a decrease of the impurity greater than or equal to this value.
  # The weighted impurity decrease equation is the following:
  # N_t / N * (impurity - N_t_R / N_t * right_impurity - N_t_L / N_t * left_impurity)
  # where N is the total number of samples, N_t is the number of samples at the current node, N_t_L is the number of samples in the left child, and N_t_R is the number of samples in the right child.
  # N, N_t, N_t_R and N_t_L all refer to the weighted sum, if sample_weight is passed.

  random_state: ${seed}
  # (int seed, RandomState instance, or None, default: None) – The seed of the pseudo random number generator to use when shuffling the data.

  max_features:
  # (int, float, string or None, optional, default: None) – The number of features to consider when looking for the best split:
  # If int, then consider max_features features at each split.
  # If float, then max_features is a percentage and int(max_features * n_features) features are considered at each split.
  # If “auto”, then max_features=n_features.
  # If “sqrt”, then max_features=sqrt(n_features).
  # If “log2”, then max_features=log2(n_features).
  # If None, then max_features=n_features.
  # Choosing max_features < n_features leads to a reduction of variance and an increase in bias.
  # Note: the search for a split does not stop until at least one valid partition of the node samples is found, even if it requires to effectively inspect more than max_features features.

  max_leaf_nodes:
  # (int or None, optional, default: None) – Grow trees with max_leaf_nodes in best-first fashion. Best nodes are defined as relative reduction in impurity. If None then unlimited number of leaf nodes.

  subsample: 1.0
  # (float, optional, default: 1.0) – The fraction of samples to be used for fitting the individual regression trees. If smaller than 1.0, this results in Stochastic Gradient Boosting. subsample interacts with the parameter n_estimators. Choosing subsample < 1.0 leads to a reduction of variance and an increase in bias.

  dropout_rate: 0.0
  # (float, optional, default: 0.0) – If larger than zero, the residuals at each iteration are only computed from a random subset of base learners. The value corresponds to the percentage of base learners that are dropped. In each iteration, at least one base learner is dropped. This is an alternative regularization to shrinkage, i.e., setting learning_rate < 1.0.

  verbose: ${verbose}
  # (int, default: 0) – Enable verbose output. If 1 then it prints progress and performance once in a while (the more trees the lower the frequency). If greater than 1 then it prints progress and performance for every tree.

  ccp_alpha: 0.0
  # (non-negative float, optional, default: 0.0.) – Complexity parameter used for Minimal Cost-Complexity Pruning. The subtree with the largest cost complexity that is smaller than ccp_alpha will be chosen. By default, no pruning is performed.

fit_params: {}

train_function:
  _target_: CMC_utils.models.train_sklearn_model

test_function:
  _target_: CMC_utils.models.test_sklearn_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pkl

load_function:
  _target_: CMC_utils.save_load.load_model