name: SurvTree
framework: sksurv
model_type: tabular

model_tasks:
  - survival_analysis

label_types:
  - single_risk_survival

set_params_function:
  _target_: CMC_utils.models.set_survival_params

init_params:
  _target_: sksurv.tree.SurvivalTree
  _convert_: all

  splitter: best
  # ({'best', 'random'}, default: 'best') – The strategy used to choose the split at each node. Supported strategies are ‘best’ to choose the best split and ‘random’ to choose the best random split.

  max_depth:
  # (int or None, optional, default: None) – The maximum depth of the tree. If None, then nodes are expanded until all leaves are pure or until all leaves contain less than min_samples_split samples.

  min_samples_split: 6
  # (int, float, optional, default: 6) –
  # The minimum number of samples required to split an internal node:
  # If int, then consider min_samples_split as the minimum number.
  # If float, then min_samples_split is a fraction and ceil(min_samples_split * n_samples) are the minimum number of samples for each split.

  min_samples_leaf: 3
  # (int, float, optional, default: 3) –
  # The minimum number of samples required to be at a leaf node. A split point at any depth will only be considered if it leaves at least min_samples_leaf training samples in each of the left and right branches. This may have the effect of smoothing the model, especially in regression.
  # If int, then consider min_samples_leaf as the minimum number.
  # If float, then min_samples_leaf is a fraction and ceil(min_samples_leaf * n_samples) are the minimum number of samples for each node.

  min_weight_fraction_leaf: 0.
  # (float, optional, default: 0.) – The minimum weighted fraction of the sum total of weights (of all the input samples) required to be at a leaf node. Samples have equal weight when sample_weight is not provided.

  max_features:
  # (int, float, string or None, optional, default: None) –
  # The number of features to consider when looking for the best split:
  # If int, then consider max_features features at each split.
  # If float, then max_features is a fraction and max(1, int(max_features * n_features_in_)) features are considered at each split.
  # If “sqrt”, then max_features=sqrt(n_features).
  # If “log2”, then max_features=log2(n_features).
  # If None, then max_features=n_features.
  # Note: the search for a split does not stop until at least one valid partition of the node samples is found, even if it requires to effectively inspect more than max_features features.

  random_state: ${seed}
  # (int, RandomState instance or None, optional, default: None) – Controls the randomness of the estimator. The features are always randomly permuted at each split, even if splitter is set to "best". When max_features < n_features, the algorithm will select max_features at random at each split before finding the best split among them. But the best found split may vary across different runs, even if max_features=n_features. That is the case, if the improvement of the criterion is identical for several splits and one split has to be selected at random. To obtain a deterministic behavior during fitting, random_state has to be fixed to an integer.

  max_leaf_nodes:
  # (int or None, optional, default: None) – Grow a tree with max_leaf_nodes in best-first fashion. Best nodes are defined as relative reduction in impurity. If None then unlimited number of leaf nodes.

  low_memory: False
  # (boolean, default: False) – If set, predict computations use reduced memory but predict_cumulative_hazard_function and predict_survival_function are not implemented.

fit_params: {}

train_function:
  _target_: CMC_utils.models.train_sklearn_model

test_function:
  _target_: CMC_utils.models.test_sklearn_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pkl

load_function:
  _target_: CMC_utils.save_load.load_model