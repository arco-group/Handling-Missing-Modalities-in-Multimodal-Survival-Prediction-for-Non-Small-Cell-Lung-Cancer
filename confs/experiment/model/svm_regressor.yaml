name: svm
framework: sklearn
model_type: tabular

model_tasks:
  - regression

label_types:
  - continuous

set_params_function:
  _target_: CMC_utils.miscellaneous.do_nothing

init_params:
  _target_: sklearn.svm.SVR
  _convert_: all

  C: 1.0
  # Regularization parameter. The strength of the regularization is inversely proportional to C. Must be strictly positive. The penalty is a squared l2 penalty.
  # float, default=1.0

  kernel: rbf
  # Specifies the kernel type to be used in the algorithm. If none is given, ‘rbf’ will be used. If a callable is given it is used to pre-compute the kernel matrix from data matrices; that matrix should be an array of shape (n_samples, n_samples).
  # {‘linear’, ‘poly’, ‘rbf’, ‘sigmoid’, ‘precomputed’} or callable, default=’rbf’

  degree: 3
  # Degree of the polynomial kernel function (‘poly’). Must be non-negative. Ignored by all other kernels.
  # int, default=3

  gamma: scale
  # Kernel coefficient for ‘rbf’, ‘poly’ and ‘sigmoid’.
  # {‘scale’, ‘auto’} or float, default=’scale’
  # - if gamma='scale' (default) is passed then it uses 1 / (n_features * X.var()) as value of gamma,
  # - if ‘auto’, uses 1 / n_features
  # - if float, must be non-negative.

  coef0: 0.0
  # Independent term in kernel function. It is only significant in ‘poly’ and ‘sigmoid’.
  # float, default=0.0

  shrinking: True
  # Whether to use the shrinking heuristic. See the User Guide.
  # bool, default=True

  tol: 1e-3
  # Tolerance for stopping criterion.
  # float, default=1e-3

  epsilon: 0.1
  # float, default=0.1
  # Epsilon in the epsilon-SVR model. It specifies the epsilon-tube within which no penalty is associated in the
  # training loss function with points predicted within a distance epsilon from the actual value. Must be non-negative.

  cache_size: 200
  # Specify the size of the kernel cache (in MB).
  # float, default=200

  verbose: ${verbose}
  # Enable verbose output. Note that this setting takes advantage of a per-process runtime setting in libsvm that, if enabled, may not work properly in a multithreaded context.
  # bool, default=False

  max_iter: -1
  # Hard limit on iterations within solver, or -1 for no limit.
  # int, default=-1

  # random_state: ${seed}
  # Controls the pseudo random number generation for shuffling the data for probability estimates. Ignored when probability is False. Pass an int for reproducible output across multiple function calls. See Glossary.
  # int, RandomState instance or None, default=None

fit_params: {}

train_function:
  _target_: CMC_utils.models.train_sklearn_model

test_function:
  _target_: CMC_utils.models.test_sklearn_model

save_function:
  _target_: CMC_utils.save_load.save_model

file_extension: pkl

load_function:
  _target_: CMC_utils.save_load.load_model