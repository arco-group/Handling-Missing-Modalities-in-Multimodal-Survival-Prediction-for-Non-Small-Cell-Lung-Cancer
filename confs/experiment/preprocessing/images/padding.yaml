_target_: CMC_utils.preprocessing.Padding
_convert_: all

size:
  # - 224
  # - 224

pad:
# (int or sequence) – Padding on each border.
# If a single int is provided this is used to pad all borders.
# If sequence of length 2 is provided this is the padding on left/right and top/bottom respectively.
# If a sequence of length 4 is provided this is the padding for the left, top, right and bottom borders respectively.

mode: constant
# (str, optional) – Type of padding.
# Should be: constant, edge, reflect or symmetric. Default is “constant”.
# - constant: pads with a constant value, this value is specified with fill
# - edge: pads with the last value at the edge of the image.
# - reflect: pads with reflection of image without repeating the last value on the edge.
#      For example, padding [1, 2, 3, 4] with 2 elements on both sides in reflect mode will result in [3, 2, 1, 2, 3, 4, 3, 2]
# - symmetric: pads with reflection of image repeating the last value on the edge.
#      For example, padding [1, 2, 3, 4] with 2 elements on both sides in symmetric mode will result in [2, 1, 1, 2, 3, 4, 4, 3]

value: ${oc.select:image_fill_preprocessing, 0}
# (number or tuple or dict, optional) – Pixel fill value used when the padding_mode is constant. Default is 0.
# If a tuple of length 3, it is used to fill R, G, B channels respectively.
# Fill value can be also a dictionary mapping data type to the fill value,
# e.g. fill={tv_tensors.Image: 127, tv_tensors.Mask: 0} where Image will be filled with 127 and Mask will be filled with 0.
