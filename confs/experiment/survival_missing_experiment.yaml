# @package _global_

experiment_name: ${db_name}_${seed}_time2event_with_missing_generation # DO NOT CHANGE
experiment_subname: ${model_name}_${preprocessing.imputer.method}_${preprocessing.numerical.method}_${preprocessing.categorical.method}_${missing_generation.train.apply_to}_${missing_generation.train.method} # DO NOT CHANGE
pipeline: missing

seed: 42
verbose: 1
time_divisor: 12

continue_experiment: True # True # False

missing_percentages: [0.0, 0.05, 0.1, 0.25, 0.5, 0.75]

db_name: ${db.name}
model_name: ${oc.select:shared_net.name, ${model.name}}

defaults:
  - _self_
  - paths@: default
  - paths: missing_experiment_paths

  - databases@db: pembro_OS

  - cross_validation@test_cv: stratifiedkfold
  - cross_validation@val_cv: holdout

  - preprocessing/missing_generation@missing_generation.train: MCAR_global  # no_generation  # MCAR_global # MCAR_sample # MCAR_feature
  - preprocessing/missing_generation@missing_generation.val: no_generation  #no_generation  # MCAR_global # MCAR_sample # MCAR_feature
  - preprocessing/missing_generation@missing_generation.test: MCAR_global  #no_generation  # MCAR_global # MCAR_sample # MCAR_feature

  - preprocessing/numerical: normalize
  - preprocessing/categorical: categoricalencode # categoricalencode or onehotencode
  - preprocessing/imputer: noimputation # simple or knn or iterative or noimputation

  - model_type_params@dl_params: dl_params
  - model_type_params@ml_params: ml_params

  - model@shared_net: naim
  - model@cs_subnet: custom_mlp
  - model: survival_wrapper #  # survival_wrapper # random_survival_forest # survival_gradient_boosting

  - model_type_params@train.dl_params: dl_params
  - initializer@train.initializer: xavier_uniform #uniform
  - loss@train.loss.loglike: survival_loglikelihood
  - loss@train.loss.ranking: survival_ranking
  - regularizer@train.regularizer.l1: l1
  - regularizer@train.regularizer.l2: l2
  - optimizer@train.optimizer: adam
  - metric@train.set_metrics.ct_index: ct_index
  - train_utils@train.manager: train_manager

  - metric@performance_metrics.ct_index: ct_index
